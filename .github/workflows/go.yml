name: Go

on:
  push:
    branches: ["master", "release/*"]
  pull_request:
    branches: ["master"]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test core
        run: go test -v ./...

      - name: Test core race
        run: go test -race -v ./...

  backends-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [mysql, sqlite, pgsql]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test backend unit
        working-directory: backends/${{ matrix.backend }}
        run: go test -v ./...

  backends-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: mysql
            profile: mysql
          - backend: sqlite
            profile: ""
          - backend: pgsql
            profile: pgsql
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Prepare integration env
        run: cp .env.example .env

      - name: Start integration services
        if: matrix.profile != ''
        run: docker compose --profile ${{ matrix.profile }} up -d

      - name: Test backend integration
        working-directory: backends/${{ matrix.backend }}
        run: go test -tags integration -race -v ./...

      - name: Stop integration services
        if: always() && matrix.profile != ''
        run: docker compose down --remove-orphans
